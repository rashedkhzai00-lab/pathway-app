kind = "web"
previewPath = "/"
title = "Pathway"
version = "1.0.0"
id = "artifacts/pathway"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25088

[services.development]
run = "pnpm --filter @workspace/pathway run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pathway", "run", "build" ]
publicDir = "artifacts/pathway/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25088"
BASE_PATH = "/"
