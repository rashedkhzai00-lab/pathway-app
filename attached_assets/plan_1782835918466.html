<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan — Pathway</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="plan.css">
</head>
<body>
<div class="scene plan-scene">

  <a class="back-link" href="../index.html">&larr; Pathway</a>

  <main class="plan-card">

    <header class="plan-header">
      <p class="eyebrow">Plan</p>
      <h2 id="rangeHeading">Today</h2>
      <div class="view-toggle" role="tablist" aria-label="View range">
        <button class="view-btn" id="todayBtn" role="tab" data-view="today">Today</button>
        <button class="view-btn" id="weekBtn" role="tab" data-view="week">This week</button>
      </div>
    </header>

    <form class="add-row" id="addForm">
      <input type="text" id="taskInput" placeholder="Add something…" autocomplete="off" required>
      <input type="date" id="dateInput" aria-label="Date">
      <input type="time" id="timeInput" aria-label="Time (optional)">
      <button type="submit" class="add-btn" aria-label="Add item">+</button>
    </form>

    <div class="list-wrap" id="listWrap">
      <!-- day groups injected here -->
    </div>

    <div class="empty-state" id="emptyState" hidden>
      <p>Nothing here yet.</p>
      <p class="empty-sub">Add one thing above — that's all this needs to start.</p>
    </div>

    <button class="toggle-completed" id="toggleCompleted">Show completed</button>

  </main>

</div>

<script src="plan.js"></script>
</body>
</html>
